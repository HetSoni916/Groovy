<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groovy AI Meeting Summary Agent</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242838;
      --border: #2e3348;
      --text: #e1e4ed;
      --text-dim: #8b90a5;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .header h1 span { color: var(--accent); }
    .badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .badge.green { border-color: var(--green); color: var(--green); }
    .badge.yellow { border-color: var(--yellow); color: var(--yellow); }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .card.full { grid-column: 1 / -1; }
    textarea, input, select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; font-size: 13px; line-height: 1.5; }
    label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; margin-top: 12px; }
    label:first-child { margin-top: 0; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      margin-top: 12px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5558e6; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--text-dim); }
    .btn-sm { padding: 6px 12px; font-size: 12px; margin-top: 0; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .output {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 60px;
      max-height: 500px;
      overflow-y: auto;
      margin-top: 12px;
    }
    .output .dim { color: var(--text-dim); }
    .output .accent { color: var(--accent); }
    .output .green { color: var(--green); }
    .output .yellow { color: var(--yellow); }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .query-bar {
      display: flex;
      gap: 8px;
      align-items: end;
    }
    .query-bar input { flex: 1; }
    .query-bar .btn { margin-top: 0; }
    .meta { font-size: 11px; color: var(--text-dim); margin-top: 8px; display: flex; gap: 16px; }
    .preset-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .preset-list .btn { margin-top: 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Groovy</span> AI Meeting Agent</h1>
    <div id="statusBadge" class="badge">Checking...</div>
  </div>

  <div class="container">
    <div class="card full">
      <h2>Process Meeting</h2>
      <label>Meeting Title</label>
      <input id="titleInput" value="Engineering Standup" placeholder="e.g. Sprint Planning">
      <label>Transcript</label>
      <textarea id="transcriptInput" placeholder="Paste meeting transcript here...">Engineering standup — June 19, 2026. Sarah: API rate limiting is done, waiting on Redis. Marcus: Dashboard redesign is on staging, needs PR review. Priya: Let's go with GraphQL for the new portal. Action items: Marcus to draft architecture doc by Wednesday. Priya to research Apollo Client. Alex to deploy Redis by Friday.</textarea>
      <label>Participants (comma-separated)</label>
      <input id="participantsInput" value="Sarah Chen, Marcus Johnson, Priya Patel, Alex Kim">
      <button class="btn btn-primary" onclick="processMeeting()">Analyze with AI</button>
      <div class="preset-list">
        <button class="btn btn-secondary btn-sm" onclick="loadTranscript('standup')">Standup</button>
        <button class="btn btn-secondary btn-sm" onclick="loadTranscript('architecture')">Architecture Review</button>
      </div>
      <div id="processOutput" class="output"><span class="dim">Results will appear here...</span></div>
    </div>

    <div class="card">
      <h2>Query Meetings</h2>
      <div class="query-bar">
        <input id="queryInput" placeholder="Search by title, keyword, or ID...">
        <button class="btn btn-primary btn-sm" onclick="queryMeetings()">Search</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary btn-sm" onclick="queryMeetings('recent')">Recent</button>
        <button class="btn btn-secondary btn-sm" onclick="queryMeetings('yesterday')">Yesterday</button>
      </div>
      <div id="queryOutput" class="output"><span class="dim">Search results will appear here...</span></div>
    </div>

    <div class="card">
      <h2>Decisions & Action Items</h2>
      <div class="query-bar">
        <input id="daQueryInput" placeholder="Search keyword...">
        <button class="btn btn-primary btn-sm" onclick="queryDecisions()">Decisions</button>
        <button class="btn btn-secondary btn-sm" onclick="queryActions()">Actions</button>
      </div>
      <div id="daOutput" class="output"><span class="dim">Results will appear here...</span></div>
    </div>

    <div class="card full">
      <h2>Slack Notifications</h2>
      <div class="btn-row">
        <button class="btn btn-secondary btn-sm" onclick="slackMeeting()">Send Last Meeting</button>
        <button class="btn btn-secondary btn-sm" onclick="slackActions()">Send Recent Actions</button>
        <button class="btn btn-secondary btn-sm" onclick="slackDecisions()">Send Recent Decisions</button>
      </div>
      <div id="slackOutput" class="output"><span class="dim">Slack results will appear here...</span></div>
    </div>
  </div>

  <script>
    let lastResult = null;

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatMeeting(m) {
      let s = `<span class="green">#${m.id}</span> <span class="accent">${escapeHtml(m.title)}</span> (${m.date})\n`;
      if (m.participants && m.participants.length) s += `👥 ${escapeHtml(m.participants.join(', '))}\n`;
      s += `\n${escapeHtml(m.summary)}\n`;
      if (m.keyPoints && m.keyPoints.length) {
        s += `\n<span class="accent">Key Points:</span>\n`;
        m.keyPoints.forEach(p => s += `  • ${escapeHtml(p)}\n`);
      }
      if (m.decisions && m.decisions.length) {
        s += `\n<span class="accent">Decisions:</span>\n`;
        m.decisions.forEach(d => s += `  • ${escapeHtml(d)}\n`);
      }
      if (m.actionItems && m.actionItems.length) {
        s += `\n<span class="accent">Action Items:</span>\n`;
        m.actionItems.forEach(a => s += `  • ${escapeHtml(a.task)} — <span class="yellow">${escapeHtml(a.owner)}</span> (${escapeHtml(a.deadline)})\n`);
      }
      if (m.risksBlockers && m.risksBlockers.length) {
        s += `\n<span class="yellow">Risks:</span>\n`;
        m.risksBlockers.forEach(r => s += `  • ${escapeHtml(r)}\n`);
      }
      if (m.costEstimate) s += `\n💰 $${m.costEstimate.toFixed(6)}`;
      return s;
    }

    function loadTranscript(type) {
      const el = document.getElementById('transcriptInput');
      if (type === 'architecture') {
        el.value = `API Architecture Review — June 18, 2026. Participants: Sarah Chen, Marcus Johnson, Priya Patel, Alex Kim, David Park.\n\nDavid: We need a decision on the API approach by Friday.\nMarcus: I recommend GraphQL over REST — fewer endpoints, more frontend flexibility.\nPriya: Agreed, I can query exactly what each widget needs.\nAlex: GraphQL means we consolidate the API gateway.\nSarah: Let's go with GraphQL. Marcus draft the doc by Wednesday.\nMarcus: Risk — newer engineers need training on GraphQL.\nSarah: I'll schedule a session for next Tuesday.`;
        document.getElementById('titleInput').value = 'API Architecture Review';
      } else {
        el.value = `Engineering standup — June 19, 2026. Sarah: API rate limiting is done, waiting on Redis. Marcus: Dashboard redesign is on staging, needs PR review. Priya: Let's go with GraphQL for the new portal. Action items: Marcus to draft architecture doc by Wednesday. Priya to research Apollo Client. Alex to deploy Redis by Friday.`;
        document.getElementById('titleInput').value = 'Engineering Standup';
      }
    }

    async function processMeeting() {
      const el = document.getElementById('processOutput');
      el.innerHTML = '<span class="spinner"></span> Processing...';
      try {
        const title = document.getElementById('titleInput').value;
        const transcript = document.getElementById('transcriptInput').value;
        const participants = document.getElementById('participantsInput').value.split(',').map(s => s.trim()).filter(Boolean);
        const data = await api('POST', '/api/process', { title, transcript, participants });
        lastResult = data.meeting;
        el.innerHTML = formatMeeting(data.meeting);
      } catch (e) {
        el.innerHTML = `<span class="yellow">Error:</span> ${escapeHtml(e.message)}`;
      }
    }

    async function queryMeetings(preset) {
      const el = document.getElementById('queryOutput');
      const q = preset || document.getElementById('queryInput').value;
      el.innerHTML = '<span class="spinner"></span> Searching...';
      try {
        const data = await api('GET', `/api/meetings?q=${encodeURIComponent(q)}&limit=5`, null, true);
        if (!data.meetings || data.meetings.length === 0) {
          el.innerHTML = '<span class="dim">No meetings found.</span>';
          return;
        }
        el.innerHTML = data.meetings.map(m => formatMeeting(m)).join('\n' + '─'.repeat(40) + '\n');
      } catch (e) {
        el.innerHTML = `<span class="yellow">Error:</span> ${escapeHtml(e.message)}`;
      }
    }

    async function queryDecisions() {
      const el = document.getElementById('daOutput');
      const q = document.getElementById('daQueryInput').value || '';
      el.innerHTML = '<span class="spinner"></span> Searching...';
      try {
        const data = await api('GET', `/api/decisions?q=${encodeURIComponent(q)}`);
        if (data.found && data.meetings.length) {
          let s = '<span class="accent">Decisions:</span>\n';
          data.meetings.forEach(m => {
            s += `\n<span class="green">${escapeHtml(m.title)}</span> (${m.date}):\n`;
            m.decisions.forEach(d => s += `  • ${escapeHtml(d)}\n`);
          });
          el.innerHTML = s;
        } else {
          el.innerHTML = '<span class="dim">No decisions found.</span>';
        }
      } catch (e) {
        el.innerHTML = `<span class="yellow">Error:</span> ${escapeHtml(e.message)}`;
      }
    }

    async function queryActions() {
      const el = document.getElementById('daOutput');
      const q = document.getElementById('daQueryInput').value || 'recent';
      el.innerHTML = '<span class="spinner"></span> Searching...';
      try {
        const data = await api('GET', `/api/actions?q=${encodeURIComponent(q)}`);
        if (data.found && data.actionItems.length) {
          let s = '<span class="accent">Action Items:</span>\n';
          data.actionItems.forEach(m => {
            s += `\n📋 ${escapeHtml(m.meetingTitle)} (${m.meetingDate}):\n`;
            m.actionItems.forEach(a => {
              s += `  • ${escapeHtml(a.task)}\n`;
              s += `    👤 <span class="yellow">${escapeHtml(a.owner)}</span>  🗓 ${escapeHtml(a.deadline)}\n`;
            });
          });
          el.innerHTML = s;
        } else {
          el.innerHTML = '<span class="dim">No action items found.</span>';
        }
      } catch (e) {
        el.innerHTML = `<span class="yellow">Error:</span> ${escapeHtml(e.message)}`;
      }
    }

    async function slackMeeting() {
      const el = document.getElementById('slackOutput');
      if (!lastResult) { el.innerHTML = '<span class="yellow">Process a meeting first.</span>'; return; }
      el.innerHTML = '<span class="spinner"></span> Sending...';
      try {
        const data = await api('POST', `/api/slack/meeting/${lastResult.id}`);
        el.innerHTML = data.slack.sent ? '<span class="green">✓ Meeting sent to Slack!</span>' : '<span class="yellow">Slack not configured.</span>';
      } catch (e) {
        el.innerHTML = `<span class="yellow">Error:</span> ${escapeHtml(e.message)}`;
      }
    }

    async function slackActions() {
      const el = document.getElementById('slackOutput');
      el.innerHTML = '<span class="spinner"></span> Sending...';
      try {
        const data = await api('POST', '/api/slack/actions', { query: 'recent' });
        el.innerHTML = data.sent ? '<span class="green">✓ Action items sent to Slack!</span>' : `<span class="yellow">${escapeHtml(data.message || 'No items')}</span>`;
      } catch (e) {
        el.innerHTML = `<span class="yellow">Error:</span> ${escapeHtml(e.message)}`;
      }
    }

    async function slackDecisions() {
      const el = document.getElementById('slackOutput');
      el.innerHTML = '<span class="spinner"></span> Sending...';
      try {
        const data = await api('POST', '/api/slack/decisions', { query: '' });
        el.innerHTML = data.slack && data.slack.sent ? '<span class="green">✓ Decisions sent to Slack!</span>' : `<span class="yellow">${escapeHtml(data.error || 'No decisions')}</span>`;
      } catch (e) {
        el.innerHTML = `<span class="yellow">Error:</span> ${escapeHtml(e.message)}`;
      }
    }

    async function checkStatus() {
      try {
        const data = await api('GET', '/api/status');
        const badge = document.getElementById('statusBadge');
        badge.className = 'badge green';
        badge.textContent = `Running · ${data.provider} · ${data.model}`;
        if (!data.slack) badge.textContent += ' · No Slack';
      } catch {
        document.getElementById('statusBadge').className = 'badge yellow';
        document.getElementById('statusBadge').textContent = 'Offline';
      }
    }
    checkStatus();
  </script>
</body>
</html>
