<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Student Management - Frontend (Dev)</title>
  <style>body{font-family:Arial;margin:2rem}button{padding:0.5rem 1rem}pre{background:#f5f5f5;padding:1rem;border-radius:6px}</style>
</head>
<body>
  <h1>Student Management (Frontend)</h1>
  <p>This minimal frontend checks backend health and lists students (may require login).</p>
  <div>
    <button id="health">Check backend health</button>
    <button id="list">Get students (requires auth)</button>
  </div>
  <h3>Result</h3>
  <pre id="out">—</pre>

  <script>
    const out = document.getElementById('out');
    document.getElementById('health').onclick = async () => {
      out.textContent = 'Checking...';
      try {
        const r = await fetch('http://localhost:6000/health');
        const j = await r.json();
        out.textContent = JSON.stringify(j, null, 2);
      } catch (e) { out.textContent = e.toString(); }
    };

    document.getElementById('list').onclick = async () => {
      out.textContent = 'Fetching...';
      try {
        const r = await fetch('http://localhost:6000/api/students');
        const text = await r.text();
        try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); } catch { out.textContent = text }
      } catch (e) { out.textContent = e.toString(); }
    };
  </script>
</body>
</html>
